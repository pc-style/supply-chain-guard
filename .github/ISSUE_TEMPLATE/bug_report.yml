name: Bug report
description: Report incorrect behavior in the CLI, docs, or website.
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: scguard version
      description: Output of `scguard version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and Bun version
      description: e.g. Ubuntu 24.04, Bun 1.3.14
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
