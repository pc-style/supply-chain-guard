name: Accessibility

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/a11y-site.test.ts"
      - ".github/workflows/a11y.yml"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "site/**"
      - "scripts/a11y-site.test.ts"
      - ".github/workflows/a11y.yml"
      - "package.json"
      - "bun.lock"

jobs:
  site-axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install chromium --with-deps
      - run: bun run a11y
