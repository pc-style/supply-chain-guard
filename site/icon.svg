<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Supply Chain Guard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded charcoal tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#27272a" stroke-width="2"/>

  <!-- shield -->
  <g transform="translate(96 80)">
    <path d="M160 0 L320 56 V168 c0 96 -60 156 -160 192 C60 324 0 264 0 168 V56 Z"
          fill="none" stroke="url(#amber)" stroke-width="20" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- inner check -->
    <path d="M96 184 L150 238 L232 138"
          fill="none" stroke="url(#amber)" stroke-width="22"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
