<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 L0 0 0 32" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- shield mark -->
  <g transform="translate(96 175)">
    <path d="M140 0 L280 50 V150 c0 86 -55 138 -140 170 C55 290 0 238 0 150 V50 Z"
          fill="none" stroke="url(#amber)" stroke-width="16" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M82 162 L132 212 L208 122"
          fill="none" stroke="url(#amber)" stroke-width="18"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="470" y="262" font-size="64" font-weight="800" fill="#fafafa" letter-spacing="-1.5">
      Supply Chain Guard
    </text>
    <text x="472" y="312" font-size="26" font-weight="500" fill="#a1a1aa" letter-spacing="-0.2">
      A local review step before npm and VS Code installs.
    </text>

    <!-- terminal chip -->
    <g transform="translate(470 380)">
      <rect width="640" height="88" rx="14" fill="#0a0a0a" stroke="#27272a" stroke-width="1"/>
      <circle cx="22" cy="44" r="6" fill="#ff5f57"/>
      <circle cx="42" cy="44" r="6" fill="#febc2e"/>
      <circle cx="62" cy="44" r="6" fill="#28c840"/>
      <text x="92" y="54" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" fill="#e4e4e7">
        <tspan fill="#fbbf24" font-weight="700">$</tspan> scguard review <tspan fill="#93c5fd">left-pad</tspan>
      </text>
    </g>

    <!-- badges row -->
    <g transform="translate(470 500)" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700">
      <g>
        <rect width="74" height="34" rx="6" fill="#f87171"/>
        <text x="37" y="24" text-anchor="middle" fill="#0d0d0d">HIGH</text>
      </g>
      <g transform="translate(86 0)">
        <rect width="74" height="34" rx="6" fill="#fbbf24"/>
        <text x="37" y="24" text-anchor="middle" fill="#0d0d0d">MED</text>
      </g>
      <g transform="translate(172 0)">
        <rect width="74" height="34" rx="6" fill="#4ade80"/>
        <text x="37" y="24" text-anchor="middle" fill="#0d0d0d">LOW</text>
      </g>
      <text x="262" y="24" font-weight="500" fill="#a1a1aa">deterministic local analysis</text>
    </g>
  </g>
</svg>
